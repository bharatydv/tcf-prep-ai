services:
  db:
    image: postgres:15-alpine
    container_name: tcf_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    build: ./backend
    container_name: tcf_backend
    restart: always
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "5000:8000"

  frontend:
    build: ./frontend
    container_name: tcf_frontend
    restart: always
    ports:
      - "80:3000"
    depends_on:
      - backend

volumes:
  db_data:
